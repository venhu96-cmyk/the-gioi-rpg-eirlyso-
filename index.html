<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thế giới RPG của EirlysO</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root{
            --bg-1:#fffaf7;
            --bg-2:#f8f0ff;
            --bg-3:#fff4fb;
            --surface: rgba(255, 255, 255, .72);
            --surface-strong: rgba(255, 255, 255, .88);
            --accent:#8f63d6;
            --accent-2:#d3a7ff;
            --accent-3:#f0c9ff;
            --text-main:#4b315f;
            --text-muted:#7b628e;
            --border: rgba(167, 131, 217, .35);
            --shadow: 0 24px 60px rgba(137, 92, 191, .12);
        }

        *{box-sizing:border-box}
        html,body{margin:0;padding:0}
        body{
            min-height:100vh;
            font-family:'Inter',system-ui,sans-serif;
            color:var(--text-main);
            background:
                radial-gradient(circle at 15% 10%, rgba(236, 212, 255, .85) 0, transparent 22%),
                radial-gradient(circle at 85% 18%, rgba(255, 225, 242, .8) 0, transparent 18%),
                radial-gradient(circle at 78% 88%, rgba(231, 210, 255, .75) 0, transparent 20%),
                linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 48%, var(--bg-3) 100%);
            overflow-x:hidden;
        }

        body::before{
            content:"";
            position:fixed;
            inset:0;
            pointer-events:none;
            opacity:.14;
            background:
                radial-gradient(circle at 20px 20px, rgba(143, 99, 214, .8) 0 2px, transparent 2.2px) 0 0 / 44px 44px,
                radial-gradient(circle at 0 0, rgba(211, 167, 255, .45) 0 1px, transparent 1.4px) 0 0 / 28px 28px;
            mask-image: linear-gradient(180deg, rgba(0,0,0,.9), rgba(0,0,0,.25));
        }

        .container{
            width:min(1200px, calc(100% - 32px));
            margin:0 auto;
            padding:28px 0 54px;
        }

        .hero{
            position:relative;
            overflow:hidden;
            padding:46px 34px 34px;
            border-radius:34px;
            background:
                linear-gradient(180deg, rgba(255,255,255,.82), rgba(255,248,255,.74)),
                radial-gradient(circle at top, rgba(255, 255, 255, .85), rgba(249, 239, 255, .55));
            border:1px solid var(--border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            margin-bottom:28px;
        }

        .hero::before,
        .hero::after{
            content:"✦";
            position:absolute;
            font-size:52px;
            color:rgba(143, 99, 214, .18);
            font-family:'Cormorant Garamond',serif;
            line-height:1;
        }
        .hero::before{top:18px;left:22px}
        .hero::after{bottom:18px;right:22px}

        .hero-top{
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            gap:18px;
            flex-wrap:wrap;
        }

        .eyebrow{
            display:inline-flex;
            align-items:center;
            gap:10px;
            padding:8px 14px;
            border-radius:999px;
            background:rgba(143, 99, 214, .08);
            color:var(--accent);
            border:1px solid rgba(143, 99, 214, .18);
            letter-spacing:.08em;
            text-transform:uppercase;
            font-size:12px;
            font-weight:700;
        }

        .title-wrap{
            max-width:720px;
        }

        .hero h1{
            margin:14px 0 10px;
            font-family:'Playfair Display',serif;
            font-size:clamp(2.2rem, 5vw, 4.4rem);
            line-height:1.02;
            font-weight:700;
            letter-spacing:.01em;
            color:var(--text-main);
            text-shadow:0 1px 0 rgba(255,255,255,.45), 0 0 22px rgba(171, 132, 232, .16);
        }

        .hero p{
            margin:0;
            max-width:780px;
            color:var(--text-muted);
            font-size:1.02rem;
            line-height:1.8;
        }

        .hero-badge{
            align-self:flex-start;
            padding:14px 18px;
            border-radius:22px;
            background:linear-gradient(135deg, rgba(255,255,255,.92), rgba(248, 237, 255, .72));
            border:1px solid rgba(167, 131, 217, .22);
            box-shadow:0 16px 34px rgba(130, 84, 187, .08);
            min-width:210px;
        }

        .hero-badge strong{
            display:block;
            font-family:'Cormorant Garamond',serif;
            font-size:1.15rem;
            color:var(--accent);
            margin-bottom:4px;
        }

        .hero-badge span{
            font-size:.92rem;
            color:var(--text-muted);
            line-height:1.55;
        }

        .controls{
            display:grid;
            grid-template-columns: 2.1fr 1fr 1fr;
            gap:14px;
            margin-top:24px;
        }

        .controls input,
        .controls select{
            width:100%;
            appearance:none;
            border:none;
            outline:none;
            padding:16px 18px;
            border-radius:18px;
            background:rgba(255,255,255,.82);
            color:var(--text-main);
            box-shadow:inset 0 0 0 1px rgba(167, 131, 217, .22), 0 10px 24px rgba(146, 99, 190, .08);
            font-size:15px;
        }

        .controls input::placeholder{color:#9a7fae}

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));
            gap:22px;
            margin-top:22px;
        }

        .card{
            position:relative;
            overflow:hidden;
            border-radius:28px;
            background:
                linear-gradient(180deg, rgba(255,255,255,.88), rgba(255,245,252,.72)),
                radial-gradient(circle at top, rgba(255,255,255,.96), rgba(247, 237, 255, .5));
            border:1px solid rgba(167, 131, 217, .22);
            box-shadow:0 20px 50px rgba(128, 84, 186, .10);
            padding:16px;
            transition:transform .28s ease, box-shadow .28s ease, border-color .28s ease;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .card::before{
            content:"❀";
            position:absolute;
            top:12px;
            right:16px;
            font-size:28px;
            color:rgba(143, 99, 214, .14);
            pointer-events:none;
        }

        .card:hover{
            transform:translateY(-6px);
            box-shadow:0 26px 64px rgba(128, 84, 186, .16);
            border-color:rgba(167, 131, 217, .36);
        }

        .image-wrap{
            position:relative;
            border-radius:22px;
            overflow:hidden;
            background:linear-gradient(135deg, rgba(143,99,214,.15), rgba(255,255,255,.45));
            box-shadow:0 12px 28px rgba(0,0,0,.10);
        }

        .card img{
            width:100%;
            aspect-ratio:1 / 1;
            object-fit:cover;
            display:block;
            transition:transform .38s ease, filter .38s ease;
        }

        .card:hover img{
            transform:scale(1.05);
            filter:saturate(1.02) contrast(1.03);
        }

        .content{
            padding:16px 6px 6px;
        }

        .card h3{
            margin:0 0 10px;
            font-family:'Cormorant Garamond',serif;
            font-size:1.8rem;
            line-height:1.08;
            color:var(--text-main);
            letter-spacing:.01em;
        }

        .tag-pill{
            display:inline-flex;
            flex-wrap:wrap;
            gap:8px;
            padding:8px 12px;
            margin-bottom:14px;
            border-radius:999px;
            background:rgba(143, 99, 214, .08);
            border:1px solid rgba(143, 99, 214, .18);
            color:var(--accent);
            font-size:12.5px;
            line-height:1.6;
        }

        .description{
            margin:0 0 18px;
            color:var(--text-muted);
            line-height:1.8;
            font-size:15px;
        }

        .card-actions{
            display:flex;
            gap:10px;
        }

        .btn{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            width:100%;
            min-height:48px;
            border-radius:16px;
            text-decoration:none;
            font-weight:700;
            transition:transform .22s ease, box-shadow .22s ease, background .22s ease;
            user-select:none;
        }

        .btn-primary{
            color:white;
            background:linear-gradient(90deg, #8f63d6, #c08dff);
            box-shadow:0 12px 26px rgba(143, 99, 214, .22);
        }

        .btn-primary:hover{
            transform:translateY(-2px);
            box-shadow:0 16px 30px rgba(143, 99, 214, .28);
        }

        .empty-state{
            grid-column:1 / -1;
            padding:30px 24px;
            border-radius:24px;
            background:rgba(255,255,255,.72);
            border:1px dashed rgba(167, 131, 217, .28);
            color:var(--text-muted);
            text-align:center;
            box-shadow:0 16px 40px rgba(128, 84, 186, .08);
        }

        .footer-note{
            margin-top:18px;
            color:rgba(123, 98, 142, .88);
            font-size:13px;
            text-align:center;
        }

        @media (max-width: 860px){
            .hero{padding:32px 22px 24px}
            .controls{grid-template-columns:1fr}
            .grid{grid-template-columns:repeat(auto-fill, minmax(280px, 1fr))}
            .hero-badge{min-width:100%}
        }

        @media (max-width: 520px){
            .container{width:min(100% - 20px, 1200px)}
            .hero h1{font-size:2.2rem}
            .card h3{font-size:1.62rem}
            .description{font-size:14px}
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="hero">
            <div class="hero-top">
                <div class="title-wrap">
                    <span class="eyebrow">✦ HỆ THỐNG RPG CỔ PHONG</span>
                    <h1>Thế giới RPG của EirlysO</h1>
                    <p>Game nhập vai, thế giới mở, đa dạng NPC, WLW, BG.</p>
                </div>

                <div class="hero-badge">
                    <strong>Hãy cùng bước vào thế giới rộng lớn do EirlysO sáng tạo.</strong>
                </div>
            </div>

            <div class="controls">
                <input type="text" id="search" placeholder="Tìm tên thế giới hoặc từ khóa..." />
                <select id="filter">
                    <option value="all">Tất cả thế giới</option>
                    <option value="#Cổ đại">#Cổ đại</option>
                    <option value="#Hiện đại">#Hiện đại</option>
                    <option value="#Tu tiên">#Tu tiên</option>
                </select>
                <select id="sort">
                    <option value="default">Mặc định</option>
                    <option value="az">A → Z</option>
                    <option value="za">Z → A</option>
                </select>
            </div>
        </header>

        <main id="grid" class="grid"></main>
        <div class="footer-note">
    </div>

    <script>
        const characterData = [
            {
                name: "Vô Ngân Giới",
                tag: "#Hiện đại #Thám hiểm #Thế giới dưới lòng đất #Dân tộc ẩn",
                summary: "Ngươi vì di chúc của ông nội mà rơi vào thế giới dưới lòng đất, từ đó ngươi vừa tìm cách thích nghi vừa giải mã bí mật nơi đây.",
                link: "https://docs.google.com/document/d/1AEu8BjLXsTQ9xAD5-KGCa4WphLfVsLj-/edit?usp=sharing&ouid=103861534465354282097&rtpof=true&sd=true",
                image: "https://i.ibb.co/C3h2QmbJ/ce288a77a28123df7a90.jpg"
            },
            {
                name: "Trưởng Công Chúa Giá Đáo",
                tag: "#Cổ đại #Mưu quyền #Báo thù rửa hận #Giả nam",
                summary: "Án thảm sát 10 năm trước của gia tộc ngươi, ngươi phải rửa sạch oan ức này.",
                link: "https://docs.google.com/document/d/1OTmcZkKJtOKJi05I0ZAfEMJJjEQHQn2A/edit?usp=sharing&ouid=103861534465354282097&rtpof=true&sd=true",
                image: "https://i.ibb.co/cs8Zc7W/5a483cb9134f9211cb5e.jpg"
            },
            {
                name: "Huyền Thiên Đại Lục",
                tag: "#Cổ đại #Tu tiên #Cày cuốc #Random tư chất",
                summary: "Ngươi là cô nhi từ Ngưu Gia Thôn được Thiên Vân Tông nhặt về, dựa vào tư chất ngươi phải sinh tồn ở thế giới tu tiên hung hiểm này.",
                link: "https://docs.google.com/document/d/1q5CWrem1SqE-Vri2TY2Fzo3AoKwtQrTR/edit?usp=sharing&ouid=103861534465354282097&rtpof=true&sd=true",
                image: "https://i.ibb.co/GfDN2vgj/4fcf671f48e9c9b790f8.jpg"
            }
        ];

        const grid = document.getElementById('grid');
        const searchInput = document.getElementById('search');
        const filterSelect = document.getElementById('filter');
        const sortSelect = document.getElementById('sort');

        function render() {
            const query = searchInput.value.toLowerCase().trim();
            const tagFilter = filterSelect.value;
            const sortMode = sortSelect.value;

            let filtered = characterData.filter(char => {
                const matchesSearch =
                    char.name.toLowerCase().includes(query) ||
                    char.tag.toLowerCase().includes(query) ||
                    char.summary.toLowerCase().includes(query);

                const matchesTag = tagFilter === 'all' || char.tag.includes(tagFilter);
                return matchesSearch && matchesTag;
            });

            if (sortMode === 'az') {
                filtered.sort((a, b) => a.name.localeCompare(b.name, 'vi'));
            } else if (sortMode === 'za') {
                filtered.sort((a, b) => b.name.localeCompare(a.name, 'vi'));
            }

            grid.innerHTML = '';

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        Không tìm thấy thế giới nào phù hợp với từ khóa của bạn.
                    </div>
                `;
                return;
            }

            filtered.forEach(char => {
                const card = document.createElement('article');
                card.className = 'card';
                card.innerHTML = `
                    <div class="image-wrap">
                        <img src="${char.image}" alt="${char.name}" loading="lazy">
                    </div>
                    <div class="content">
                        <h3>${char.name}</h3>
                        <div class="tag-pill">${char.tag}</div>
                        <p class="description">${char.summary}</p>
                        <div class="card-actions">
                            <a href="${char.link}" target="_blank" rel="noopener noreferrer" class="btn btn-primary">🌸 Mở Thế Giới</a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        searchInput.addEventListener('input', render);
        filterSelect.addEventListener('change', render);
        sortSelect.addEventListener('change', render);
        render();
    </script>
</body>
</html>
